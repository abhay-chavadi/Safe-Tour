<html>
<head>
    <title>Get Geolocation</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
    <style>
    html,
    body,
    #map {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    }
    </style>
        <script src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token=ylsajcxkwlytugyzbtpvwwrhlezzteaukczs&callback=initMap1" defer async></script>
    </head>
<body>
            <div id="map"></div>
                <script>
var map;
function initMap1() {
    map = new mappls.Map('map', {
        center: [28.61, 77.23],
        zoomControl: true,
        layerControl: true,
        map_type: 'satellite'
    });
}
</script>
</body>
